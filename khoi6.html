<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Lớp Khối 6 - Trung Tâm Thăng Long</title>
    <link rel="icon" type="image/png" href="logo-tab.png">
    <style>
        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #334155;
            line-height: 1.6;
            padding: 30px 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .header-title {
            color: #1e3a8a;
            text-align: center;
            margin-bottom: 10px;
            font-size: 26px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .header-subtitle {
            text-align: center;
            color: #64748b;
            font-size: 16px;
            margin-bottom: 35px;
        }

        /* GRID DANH SÁCH LỚP */
        .grid-classes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .class-item-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .class-box {
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .class-box:hover {
            border-color: #3b82f6;
            background-color: #f0fdf4; /* Đổi màu nền nhẹ khi chỉ chuột vào */
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1);
        }

        .class-name {
            font-size: 22px;
            font-weight: 700;
            color: #1d4ed8;
            margin-bottom: 5px;
        }

        .class-desc {
            font-size: 14px;
            color: #64748b;
        }

        /* NÚT QUAY LẠI TRANG CHỦ */
        .back-home-btn {
            display: inline-block;
            margin-top: 20px;
            background-color: #64748b;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .back-home-btn:hover {
            background-color: #475569;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="header-title">Khối 6 - Danh Sách Lớp Học</h1>
    <p class="header-subtitle">Vui lòng chọn đúng lớp học của học sinh để xem nhận xét tình hình học tập</p>
    
    <div class="grid-classes">
        
        <a href="6t3b.html" class="class-item-link">
            <div class="class-box">
                <div class="class-name">Lớp 6T3B</div>
                <div class="class-desc">Bấm để xem nhận xét</div>
            </div>
        </a>

        <a href="6t4b.html" class="class-item-link">
            <div class="class-box">
                <div class="class-name">Lớp 6T4B</div>
                <div class="class-desc">Bấm để xem nhận xét</div>
            </div>
        </a>

        <a href="6t5b.html" class="class-item-link">
            <div class="class-box">
                <div class="class-name">Lớp 6T5B</div>
                <div class="class-desc">Bấm để xem nhận xét</div>
            </div>
        </a>

    </div>

    <center>
        <a href="index.html" class="back-home-btn">⬅ Quay lại Trang chủ</a>
    </center>
</div>

</body>
</html>
